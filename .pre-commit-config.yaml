# Pre-commit hooks. Install once:
#   pip install pre-commit
#   pre-commit install -t pre-commit -t pre-push
# Then hooks run automatically on `git commit` (hygiene + explicit-content guard)
# and `git push` (fast unit tests). Run on demand: `pre-commit run --all-files`.

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=2048"]   # block accidental media/weights commits

  - repo: local
    hooks:
      - id: no-explicit-content
        name: block real/explicit library content
        entry: python scripts/check_no_explicit.py
        language: system
        pass_filenames: false
        always_run: true

      - id: fast-tests
        name: fast unit tests (algorithmic core)
        entry: python -m pytest -q -m "not media and not ml"
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]       # keep commits fast; gate pushes on the suite
