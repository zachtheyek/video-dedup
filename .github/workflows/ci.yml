name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  fast:
    name: fast unit tests (algorithmic core)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
      - run: pip install -e ".[dev]"
      - run: pytest -q -m "not media and not ml"

  media:
    name: media tests (ffmpeg fixtures)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - run: pip install -e ".[dev,audio]"
      # builds synthetic fixtures with ffmpeg, then runs the media suite (no torch)
      - run: pytest -q -m "media and not ml"

  # The ml suite (SSCD/torch) downloads ~99 MB of model weights, so it is
  # manual-only — run it from the Actions tab via "Run workflow", or locally.
  ml:
    name: ml tests (SSCD)
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
      - run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - run: pip install -e ".[dev,audio,ml]"
      - run: pytest -q -m ml
